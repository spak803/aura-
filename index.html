<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA AI | 에이전트 통합 가드</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-blue { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .glass-panel { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(51, 65, 85, 0.5); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(59, 130, 246, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.2); border-radius: 10px; }
        /* LED 기본 스타일 */
        .led-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #334155; transition: all 0.1s; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300">

    <!-- [메인 화면] -->
    <div id="main-screen" class="h-screen flex flex-col items-center justify-center bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/10 via-slate-950 to-slate-950">
        <header class="absolute top-8 left-8">
            <h1 class="orbitron text-3xl font-black tracking-tighter neon-blue">AURAAI.KR</h1>
        </header>

        <div class="text-center">
            <h2 class="orbitron text-6xl font-black mb-4 tracking-tighter text-white">AURA <span class="text-blue-500">GUARD</span></h2>
            <p class="text-slate-500 tracking-[0.4em] font-light mb-16 uppercase text-xs">The Universal Agent Guard</p>

            <div class="grid grid-cols-5 gap-10 mb-20 max-w-5xl mx-auto px-6">
                <div class="group text-center"><div class="text-4xl mb-3">⚡</div><p class="text-sm font-medium">토큰 최적화</p></div>
                <div class="group text-center"><div class="text-4xl mb-3">🛑</div><p class="text-sm font-medium">무한루프 방지</p></div>
                <div class="group text-center"><div class="text-4xl mb-3">📡</div><p class="text-sm font-medium">실시간 관제</p></div>
                <div class="group text-center"><div class="text-4xl mb-3">📉</div><p class="text-sm font-medium">비용 절감</p></div>
                <div class="group text-center"><div class="text-4xl mb-3">🛡️</div><p class="text-sm font-medium">통합 제어</p></div>
            </div>

            <button onclick="startSystem()" class="orbitron bg-blue-600 hover:bg-blue-500 text-white px-16 py-5 rounded-full text-xl font-bold transition-all shadow-[0_0_30px_rgba(59,130,246,0.4)] border border-blue-400">
                START SYSTEM
            </button>
        </div>
    </div>

    <!-- [제어 화면] -->
    <div id="control-screen" class="hidden h-screen p-8 flex flex-col">
        <header class="flex justify-between items-center mb-8">
            <h1 class="orbitron text-2xl font-bold neon-blue">AURA <span class="font-light text-slate-500 text-sm italic">CONTROL CENTER</span></h1>
            <div class="flex items-center gap-6">
                <button onclick="location.reload()" class="bg-red-600 hover:bg-red-500 text-white px-6 py-2 rounded-lg text-xs font-bold orbitron transition-all">STOP ENGINE</button>
                <div class="text-[10px] orbitron text-right">
                    <span class="text-green-500">● SYSTEM ONLINE</span><br>
                    <span id="license-tier" class="text-slate-500">FREE VERSION</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-6 h-[calc(100vh-180px)]">
            <!-- 왼쪽 에이전트 리스트 (col-span-4) -->
            <div class="col-span-4 glass-panel rounded-3xl p-6 flex flex-col overflow-hidden">
                <h3 class="orbitron text-xs text-blue-500 mb-6 tracking-widest uppercase">Agent Control</h3>
                
                <div id="agent-container" class="flex-1 overflow-y-auto custom-scrollbar space-y-4 pr-2">
                    <!-- 에이전트 항목들이 스크립트로 생성됨 -->
                </div>
            </div>

            <!-- 오른쪽 로그창 (col-span-8) -->
            <div class="col-span-8 glass-panel rounded-3xl p-6 flex flex-col overflow-hidden">
                <h3 class="orbitron text-xs text-blue-500 mb-6 tracking-widest uppercase">AURA Logic Behavior</h3>
                <div id="behavior-log" class="flex-1 font-mono text-[11px] space-y-1.5 overflow-y-auto pr-2 custom-scrollbar text-slate-400">
                    <p class="text-blue-500/50">> AURA Kernel Loaded. Waiting for Agent selection...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const agentNames = ["AUTO_GPT_MAIN", "CREW_AI_V2", "RESEARCH_AGENT", "DEVELOPER_BOT", "DATA_ANALYST", "WEB_SCANNER"];
        let activeAgents = new Set();
        let isPro = false;

        function startSystem() {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('control-screen').classList.remove('hidden');
            renderAgents();
        }

        function renderAgents() {
            const container = document.getElementById('agent-container');
            agentNames.forEach((name, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 bg-slate-900/50 rounded-2xl border border-slate-800 transition-all";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div id="led-${index}" class="led-dot"></div>
                        <span class="text-xs orbitron text-slate-400">${name}</span>
                    </div>
                    <input type="checkbox" onchange="toggleAgent(${index}, this)" class="w-4 h-4 rounded bg-slate-800 border-slate-700 text-blue-600 focus:ring-0">
                `;
                container.appendChild(div);
            });
        }

        function toggleAgent(index, checkbox) {
            if (!isPro && activeAgents.size >= 3 && checkbox.checked) {
                checkbox.checked = false;
                alert("무료 버전은 최대 3개까지만 관리 가능합니다!");
                return;
            }

            if (checkbox.checked) {
                activeAgents.add(index);
                addLog(`GUARD ACTIVE: ${agentNames[index]}`, "text-blue-400");
            } else {
                activeAgents.delete(index);
                addLog(`GUARD OFF: ${agentNames[index]}`, "text-slate-600");
                document.getElementById(`led-${index}`).style.backgroundColor = "#334155";
                document.getElementById(`led-${index}`).style.boxShadow = "none";
            }
        }

        // 모뎀 스타일 실시간 점멸 시뮬레이션
        setInterval(() => {
            activeAgents.forEach(id => {
                if (Math.random() > 0.7) {
                    const led = document.getElementById(`led-${id}`);
                    led.style.backgroundColor = "#ef4444";
                    led.style.boxShadow = "0 0 10px #ef4444";
                    
                    addLog(`[TRAFFIC] ${agentNames[id]} OPTIMIZED`, "text-[10px] text-slate-500");

                    setTimeout(() => {
                        led.style.backgroundColor = "#334155";
                        led.style.boxShadow = "none";
                    }, 150);
                }
            });
        }, 600);

        function addLog(msg, colorClass) {
            const log = document.getElementById('behavior-log');
            const p = document.createElement('p');
            p.className = colorClass;
            p.innerHTML = `<span class="text-slate-800">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
            log.prepend(p);
        }
    </script>
</body>
</html>
