<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AURA AI | 에이전트 통합 가드</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #020617; color: #e2e8f0; overflow: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-blue { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .glass-panel { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(51, 65, 85, 0.4); backdrop-filter: blur(12px); }
        .led-dot { width: 10px; height: 10px; border-radius: 50%; background-color: #1e293b; transition: all 0.1s; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 10px; }
        #main-screen { background: radial-gradient(circle at center, #1e3a8a 0%, #020617 100%); }
    </style>
</head>
<body>

    <!-- [1. 메인 랜딩 화면] -->
    <div id="main-screen" class="h-screen flex flex-col items-center justify-center relative">
        <header class="absolute top-8 left-8">
            <h1 class="orbitron text-3xl font-black tracking-tighter neon-blue uppercase">AURAAI.KR</h1>
        </header>

        <div class="text-center z-10">
            <h2 class="orbitron text-7xl font-black mb-4 tracking-tighter text-white">AURA <span class="text-blue-500 font-bold">GUARD</span></h2>
            <p class="text-slate-500 tracking-[0.4em] font-light mb-16 uppercase text-xs">The Universal Agent Guard</p>

            <!-- 원본의 이모티콘 그리드 복구 -->
            <div class="grid grid-cols-5 gap-10 mb-20 max-w-5xl mx-auto px-6">
                <div class="group"><div class="text-4xl mb-3 transition-transform group-hover:scale-110">✂️</div><p class="text-sm font-medium text-slate-300">토큰 최적화</p><p class="text-[10px] text-slate-500">비용 가위질</p></div>
                <div class="group"><div class="text-4xl mb-3 transition-transform group-hover:scale-110">🛑</div><p class="text-sm font-medium text-slate-300">무한루프 방지</p><p class="text-[10px] text-slate-500">지능적 차단</p></div>
                <div class="group"><div class="text-4xl mb-3 transition-transform group-hover:scale-110">📡</div><p class="text-sm font-medium text-slate-300">실시간 관제</p><p class="text-[10px] text-slate-500">에이전트 감시</p></div>
                <div class="group"><div class="text-4xl mb-3 transition-transform group-hover:scale-110">📉</div><p class="text-sm font-medium text-slate-300">비용 절감</p><p class="text-[10px] text-slate-500">소모율 25%↓</p></div>
                <div class="group"><div class="text-4xl mb-3 transition-transform group-hover:scale-110">🛡️</div><p class="text-sm font-medium text-slate-300">통합 제어</p><p class="text-[10px] text-slate-500">OS급 가드</p></div>
            </div>

            <button onclick="startSystem()" class="orbitron bg-blue-600 hover:bg-blue-500 text-white px-20 py-6 rounded-full text-2xl font-bold transition-all border border-blue-400 shadow-[0_0_50px_rgba(59,130,246,0.3)]">
                START SYSTEM
            </button>
        </div>
    </div>

    <!-- [2. 4분할 제어 시스템] -->
    <div id="control-center" class="hidden h-screen p-8 flex flex-col">
        <header class="flex justify-between items-center mb-6">
            <h1 class="orbitron text-2xl font-bold neon-blue uppercase">AURA CONTROL</h1>
            <div class="flex items-center gap-6 text-[10px] orbitron">
                <span id="tier-badge" class="text-blue-500">FREE TIER (MAX 3)</span>
                <button onclick="location.reload()" class="text-red-500 border border-red-500/30 px-4 py-1 rounded">EXIT</button>
            </div>
        </header>

        <div class="grid grid-cols-2 grid-rows-2 gap-6 flex-1 overflow-hidden">
            <!-- 창 1: 에이전트 리스트 -->
            <div class="glass-panel rounded-3xl p-6 flex flex-col overflow-hidden">
                <h3 class="orbitron text-xs text-blue-500 mb-6 tracking-widest">AGENT LIST</h3>
                <div id="agent-list" class="flex-1 space-y-4 overflow-y-auto custom-scrollbar pr-2"></div>
            </div>

            <!-- 창 2: 동작 로그 -->
            <div class="glass-panel rounded-3xl p-6 flex flex-col overflow-hidden">
                <h3 class="orbitron text-xs text-blue-500 mb-6 tracking-widest">BEHAVIOR LOG</h3>
                <div id="behavior-log" class="flex-1 font-mono text-[10px] space-y-1 overflow-y-auto custom-scrollbar text-slate-500"></div>
            </div>

            <!-- 창 3: 절약 통계 -->
            <div class="glass-panel rounded-3xl p-6 flex flex-col items-center justify-center relative">
                <h3 class="orbitron text-xs text-blue-500 absolute top-6 left-6 uppercase tracking-widest">Efficiency</h3>
                <div id="savings-percent" class="orbitron text-8xl font-black text-green-500">0%</div>
                <div class="mt-4 orbitron text-slate-500 text-sm">SAVED: <span id="saved-tokens" class="text-blue-400">0</span> TKNS</div>
            </div>

            <!-- 창 4: 제어 스위치 -->
            <div class="glass-panel rounded-3xl p-6">
                <h3 class="orbitron text-xs text-blue-500 mb-6 uppercase tracking-widest">Control Switches</h3>
                <div class="grid grid-cols-2 gap-4">
                    <button class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 text-[11px] orbitron text-left hover:border-blue-500/50 transition-all">✂️ SEMANTIC PRUNING</button>
                    <button class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 text-[11px] orbitron text-left hover:border-blue-500/50 transition-all">🛑 LOOP BLOCKER</button>
                    <button class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 text-[11px] orbitron text-left hover:border-blue-500/50 transition-all">📡 REAL-TIME MONITOR</button>
                    <button onclick="alert('PRO 라이선스가 필요합니다.')" class="bg-blue-600 p-4 rounded-2xl text-[11px] orbitron font-bold">💎 UPGRADE TO PRO</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const agents = ["AUTO_GPT_01", "RESEARCH_V2", "CODE_PILOT", "DATA_EXTRACT", "WEB_SCRAPER"];
        let activeAgents = new Set();
        let totalSaved = 0;

        function startSystem() {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('control-center').classList.remove('hidden');
            render();
        }

        function render() {
            const list = document.getElementById('agent-list');
            agents.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 bg-slate-900/30 border border-slate-800 rounded-2xl";
                div.innerHTML = `
                    <div class="flex items-center gap-4"><div id="led-${i}" class="led-dot"></div><span class="text-[11px] orbitron">${name}</span></div>
                    <input type="checkbox" onchange="toggle(${i}, this)" class="w-4 h-4 accent-blue-600">
                `;
                list.appendChild(div);
            });
        }

        function toggle(i, cb) {
            if (activeAgents.size >= 3 && cb.checked) {
                cb.checked = false;
                alert("무료 버전 한도 초과 (3개)");
                return;
            }
            cb.checked ? activeAgents.add(i) : activeAgents.delete(i);
            addLog(cb.checked ? `ACTIVE: ${agents[i]}` : `OFF: ${agents[i]}`);
        }

        setInterval(() => {
            activeAgents.forEach(i => {
                if (Math.random() > 0.6) {
                    const led = document.getElementById(`led-${i}`);
                    led.style.backgroundColor = "#ef4444";
                    led.style.boxShadow = "0 0 10px #ef4444";
                    const saved = Math.floor(Math.random() * 80);
                    totalSaved += saved;
                    document.getElementById('saved-tokens').innerText = totalSaved.toLocaleString();
                    document.getElementById('savings-percent').innerText = Math.min(65, Math.floor(totalSaved/500)) + "%";
                    addLog(`[${agents[i]}] OPTIMIZING -${saved} TKNS`);
                    setTimeout(() => { led.style.backgroundColor = "#1e293b"; led.style.boxShadow = "none"; }, 150);
                }
            });
        }, 800);

        function addLog(msg) {
            const log = document.getElementById('behavior-log');
            const p = document.createElement('p');
            p.innerHTML = `<span class="text-slate-800">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
            log.prepend(p);
        }
    </script>
</body>
</html>
