<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA AI | 에이전트 통합 가드</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #020617; color: #e2e8f0; overflow: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-blue { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5), 0 0 20px rgba(59, 130, 246, 0.3); }
        .glass-panel { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(51, 65, 85, 0.5); backdrop-filter: blur(12px); }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); transform: translateY(-2px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(59, 130, 246, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 10px; }
        .led-blink { transition: all 0.1s ease-in-out; }
    </style>
</head>
<body>

    <!-- 메인 랜딩 화면 -->
    <div id="main-screen" class="h-screen relative flex flex-col items-center justify-center bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-slate-950 to-slate-950">
        <header class="absolute top-8 left-8">
            <h1 class="orbitron text-3xl font-black tracking-tighter neon-blue">AURAAI.KR</h1>
        </header>

        <div class="text-center z-10">
            <h2 class="orbitron text-6xl font-black mb-4 tracking-tighter">AURA <span class="text-blue-500">GUARD</span></h2>
            <p class="text-slate-500 tracking-[0.4em] font-light mb-16 uppercase text-xs">The Universal Agent Token Protector</p>

            <div class="grid grid-cols-5 gap-8 mb-20 max-w-4xl mx-auto px-6">
                <div class="group"><div class="text-3xl mb-3">⚡</div><p class="text-xs font-medium text-slate-300">토큰 최적화</p></div>
                <div class="group"><div class="text-3xl mb-3">🛑</div><p class="text-xs font-medium text-slate-300">무한루프 방지</p></div>
                <div class="group"><div class="text-3xl mb-3">📡</div><p class="text-xs font-medium text-slate-300">실시간 관제</p></div>
                <div class="group"><div class="text-3xl mb-3">📉</div><p class="text-xs font-medium text-slate-300">비용 60% 절감</p></div>
                <div class="group"><div class="text-3xl mb-3">🛡️</div><p class="text-xs font-medium text-slate-300">OS급 보안</p></div>
            </div>

            <button onclick="startSystem()" class="orbitron bg-blue-600 hover:bg-blue-500 text-white px-16 py-5 rounded-full text-xl font-bold transition-all btn-glow border border-blue-400">
                START SYSTEM
            </button>
        </div>
    </div>

    <!-- 제어 센터 화면 (초기 숨김) -->
    <div id="control-center" class="hidden h-screen p-8 flex flex-col bg-slate-950">
        <header class="flex justify-between items-center mb-8">
            <h1 class="orbitron text-2xl font-bold neon-blue">AURA <span class="font-light text-slate-500 text-sm italic">CONTROL CENTER</span></h1>
            <div class="flex items-center gap-6">
                <div class="text-[10px] orbitron text-right">
                    <span class="text-green-500">● SYSTEM ONLINE</span><br>
                    <span id="tier-badge" class="text-blue-400">FREE TIER (MAX 3)</span>
                </div>
                <button onclick="location.reload()" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white border border-red-900 px-4 py-2 rounded text-[10px] orbitron transition-all">TERMINATE</button>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-6 h-[calc(100vh-180px)]">
            <!-- 왼쪽: 에이전트 리스트 -->
            <div class="col-span-4 glass-panel rounded-3xl p-6 flex flex-col">
                <h3 class="orbitron text-xs text-blue-500 mb-6 tracking-widest uppercase">Connected Agents</h3>
                <div id="agent-list" class="flex-1 space-y-3 overflow-y-auto pr-2 custom-scrollbar">
                    <!-- 에이전트 아이템들이 스크립트로 생성됩니다 -->
                </div>
                <div class="mt-4 p-4 bg-blue-600/10 border border-blue-500/20 rounded-xl">
                    <p class="text-[10px] text-blue-400 orbitron">TOTAL SAVED: <span id="total-saved">0</span> TOKENS</p>
                </div>
            </div>

            <!-- 오른쪽: 실시간 로그 -->
            <div class="col-span-8 glass-panel rounded-3xl p-6 flex flex-col">
                <h3 class="orbitron text-xs text-blue-500 mb-6 tracking-widest uppercase">AURA Logic Behavior Log</h3>
                <div id="behavior-log" class="flex-1 font-mono text-[11px] space-y-1.5 overflow-y-auto pr-2 custom-scrollbar text-slate-500">
                    <p class="text-blue-500/50">> AURA Guard Engine Initialized...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPro = false; // 결제 여부
        const agents = [
            "AUTO_GPT_MAIN", "CREW_AI_MANAGER", "RESEARCHER_V3", 
            "CODE_GEN_BOT", "DATA_ANALYST", "WEB_SCRAPER_PRO"
        ];
        let activeAgents = new Set();

        function startSystem() {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('control-center').classList.remove('hidden');
            initAgentList();
        }

        function initAgentList() {
            const listContainer = document.getElementById('agent-list');
            agents.forEach((name, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 bg-slate-900/40 border border-slate-800 rounded-2xl hover:border-blue-500/30 transition-all";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div id="led-${index}" class="w-2.5 h-2.5 rounded-full bg-slate-800 shadow-inner led-blink"></div>
                        <span class="text-[11px] orbitron text-slate-300">${name}</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" onchange="toggleAgent(${index}, this)" class="sr-only peer">
                        <div class="w-8 h-4 bg-slate-700 rounded-full peer peer-checked:bg-blue-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-4"></div>
                    </label>
                `;
                listContainer.appendChild(div);
            });
        }

        function toggleAgent(index, checkbox) {
            if (!isPro && activeAgents.size >= 3 && checkbox.checked) {
                checkbox.checked = false;
                alert("무료 버전은 최대 3개까지만 보호 가능합니다! \nPRO 버전으로 업그레이드 하세요.");
                return;
            }

            if (checkbox.checked) {
                activeAgents.add(index);
                addLog(`GUARD ACTIVATED: ${agents[index]}`, "text-green-500");
            } else {
                activeAgents.delete(index);
                addLog(`GUARD DEACTIVATED: ${agents[index]}`, "text-slate-600");
                document.getElementById(`led-${index}`).style.backgroundColor = '#1e293b';
                document.getElementById(`led-${index}`).style.boxShadow = 'none';
            }
        }

        // 실시간 모뎀 점멸 효과 (데이터 유입 시뮬레이션)
        setInterval(() => {
            activeAgents.forEach(index => {
                if (Math.random() > 0.6) { // 트래픽 발생 시 점멸
                    const led = document.getElementById(`led-${index}`);
                    led.style.backgroundColor = '#ef4444'; // 빨간색 점등
                    led.style.boxShadow = '0 0 10px #ef4444';
                    
                    const saved = Math.floor(Math.random() * 120);
                    addLog(`[${agents[index]}] OPTIMIZING... -${saved} TOKENS`, "text-blue-400");
                    updateTotalSaved(saved);

                    setTimeout(() => {
                        led.style.backgroundColor = '#1e293b'; // 소등
                        led.style.boxShadow = 'none';
                    }, 100);
                }
            });
        }, 800);

        function addLog(msg, colorClass) {
            const log = document.getElementById('behavior-log');
            const p = document.createElement('p');
            p.className = colorClass;
            p.innerHTML = `<span class="text-slate-700">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
            log.prepend(p);
            if (log.children.length > 50) log.lastChild.remove();
        }

        let totalSaved = 0;
        function updateTotalSaved(val) {
            totalSaved += val;
            document.getElementById('total-saved').innerText = totalSaved.toLocaleString();
        }
    </script>
</body>
</html>
