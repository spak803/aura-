<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA AI | Control Tower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@100;300;500&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #001233 0%, #000000 100%); color: #e0e0e0; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; height: 100vh; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-text { text-shadow: 0 0 10px #0077ff, 0 0 20px #0077ff; }
        .neon-border { box-shadow: 0 0 15px rgba(0, 119, 255, 0.4); border: 1px solid rgba(0, 119, 255, 0.5); }
        .panel { background: rgba(0, 10, 30, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0, 119, 255, 0.3); }
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }
        
        /* 팝업 스타일 */
        #popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; }
        #desktop-ui { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 110; width: 600px; }
        
        .toggle-dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .toggle-dot { transform: translateX(100%); background-color: #0077ff; }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

    <canvas id="canvas"></canvas>

    <main id="main-view" class="text-center z-10">
        <header class="mb-12">
            <h1 class="orbitron text-5xl font-bold tracking-[0.5em] neon-text mb-4">AURA AI</h1>
            <p class="text-blue-300 opacity-70 tracking-widest uppercase text-xs">The Gateway to Agentic Era</p>
        </header>

        <div class="panel p-16 rounded-3xl neon-border">
            <h2 class="orbitron text-xl mb-8 text-blue-400">CORE OPTIMIZER ENGINE</h2>
            <div class="text-8xl orbitron font-bold mb-12 neon-text">74<span class="text-2xl text-blue-500">%</span></div>
            
            <button onclick="openPopup()" class="bg-blue-600 hover:bg-blue-500 text-white orbitron px-12 py-5 rounded-full text-lg transition-all tracking-widest shadow-[0_0_20px_rgba(0,119,255,0.5)]">
                HIRE AURA AGENT
            </button>
        </div>
    </main>

    <div id="popup" class="panel p-8 rounded-2xl w-96 neon-border">
        <h3 class="orbitron text-xl mb-6 text-center text-blue-400">HIRE AGENT</h3>
        <p class="text-sm mb-8 text-center opacity-80">이 에이전트를 시스템에 상주시킬까요?<br>토큰 비용을 즉시 가위질하기 시작합니다.</p>
        
        <div class="flex items-center justify-between mb-8 px-4">
            <span class="text-xs text-blue-200">컴퓨터 시작 시 자동 작동</span>
            <label class="flex items-center cursor-pointer">
                <div class="relative">
                    <input type="checkbox" id="auto-start" class="sr-only" checked>
                    <div class="block bg-gray-700 w-10 h-6 rounded-full"></div>
                    <div class="toggle-dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full"></div>
                </div>
            </label>
        </div>

        <button onclick="hireSuccess()" class="w-full bg-blue-700 py-3 rounded-lg orbitron tracking-widest hover:bg-blue-600 transition-colors">
            CONFIRM HIRE
        </button>
        <button onclick="closePopup()" class="w-full mt-4 text-xs opacity-50 hover:opacity-100 underline">CANCEL</button>
    </div>

    <div id="desktop-ui" class="panel p-8 rounded-2xl neon-border">
        <div class="flex justify-between items-center mb-8 border-b border-blue-900 pb-4">
            <span class="orbitron text-blue-400">AURA DASHBOARD v1.0</span>
            <button onclick="location.reload()" class="text-xs opacity-50">CLOSE</button>
        </div>
        
        <div class="space-y-4">
            <div class="flex justify-between items-center bg-black bg-opacity-40 p-4 rounded-lg">
                <div class="flex items-center">
                    <div class="w-2 h-2 bg-green-500 rounded-full mr-3 animate-pulse"></div>
                    <span class="text-sm font-bold">Python Auto-Bot</span>
                </div>
                <span class="orbitron text-blue-400 text-sm">62% SAVED</span>
            </div>
            <div class="flex justify-between items-center bg-black bg-opacity-40 p-4 rounded-lg">
                <div class="flex items-center">
                    <div class="w-2 h-2 bg-green-500 rounded-full mr-3 animate-pulse"></div>
                    <span class="text-sm font-bold">Customer Support AI</span>
                </div>
                <span class="orbitron text-blue-400 text-sm">81% SAVED</span>
            </div>
            <div class="flex justify-between items-center bg-black bg-opacity-40 p-4 rounded-lg opacity-40">
                <div class="flex items-center">
                    <div class="w-2 h-2 bg-gray-500 rounded-full mr-3"></div>
                    <span class="text-sm font-bold">Data Analyzer</span>
                </div>
                <span class="orbitron text-xs">OFFLINE</span>
            </div>
        </div>
        
        <p class="mt-8 text-[10px] text-center opacity-40 orbitron">MONITORING 24 ACTIVE AGENTS IN THIS SYSTEM</p>
    </div>

    <script>
        function openPopup() { document.getElementById('popup').style.display = 'block'; }
        function closePopup() { document.getElementById('popup').style.display = 'none'; }
        function hireSuccess() {
            document.getElementById('popup').style.display = 'none';
            document.getElementById('main-view').style.opacity = '0.2';
            document.getElementById('desktop-ui').style.display = 'block';
            alert('바탕화면에 Aura AI 아이콘이 생성되었습니다.\n실제 시스템 관제를 시작합니다.');
        }

        // 배경 신경망 애니메이션 (동일)
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<50; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5 });
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = '#0077ff';
            particles.forEach((p,i)=>{
                p.x+=p.vx; p.y+=p.vy;
                if(p.x<0||p.x>canvas.width) p.vx*=-1; if(p.y<0||p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x,p.y,1,0,Math.PI*2); ctx.fill();
                for(let j=i+1;j<particles.length;j++){
                    const p2=particles[j]; const dist=Math.hypot(p.x-p2.x,p.y-p2.y);
                    if(dist<150){ ctx.strokeStyle=`rgba(0,119,255,${1-dist/150})`; ctx.lineWidth=0.5; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p2.x,p2.y); ctx.stroke(); }
                }
            });
            requestAnimationFrame(draw);
        }
        init(); draw(); window.onresize = init;
    </script>
</body>
</html>
